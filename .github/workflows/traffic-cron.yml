name: Traffic Data Collection

on:
  schedule:
    - cron: '*/15 22-11 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - run: node save-traffic.js
        env:
          SUPABASE_URL: https://asdadmmreyzhelxrares.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}